name: Bot Mundial 2026

on:
  schedule:
    # Resumen de partidos: cada 15 min en franja amplia de partidos
    # openfootball actualiza rápido, así que conviene chequear seguido
    - cron: "*/15 15-23 * * *"   # 12:00-20:00 AR
    - cron: "*/15 0-6   * * *"   # 21:00-03:00 AR
    # Programados (1 vez al día)
    - cron: "0 11 * * *"   # 08:00 AR — dato curioso
    - cron: "0 12 * * *"   # 09:00 AR — fixture del día
    - cron: "0 13 * * *"   # 10:00 AR — previa de Argentina
    - cron: "0 14 * * *"   # 11:00 AR — análisis de grupo
    - cron: "0 16 * * *"   # 13:00 AR — número del día
    - cron: "0 18 * * *"   # 15:00 AR — debate
    - cron: "0 10 * * *"   # 07:00 AR — figura de la fecha (de la jornada anterior)
    - cron: "0 15 * * *"   # 12:00 AR — noticia (mediodía)
    - cron: "0 23 * * *"   # 20:00 AR — noticia (noche)

  workflow_dispatch:
    inputs:
      modo:
        description: "Modo del bot"
        required: true
        default: "resumen_partido"
        type: choice
        options:
          - resumen_partido
          - analisis_grupo
          - fixture_dia
          - previa_argentina
          - dato_curioso
          - figura_fecha
          - debate
          - numero_dia
          - noticia
      preview:
        description: "Solo preview (no publica)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Resumen de partidos
        if: github.event_name == 'schedule' && startsWith(github.event.schedule, '*/15')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py resumen_partido

      - name: Dato curioso
        if: github.event_name == 'schedule' && github.event.schedule == '0 11 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py dato_curioso

      - name: Fixture del dia
        if: github.event_name == 'schedule' && github.event.schedule == '0 12 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py fixture_dia

      - name: Previa Argentina
        if: github.event_name == 'schedule' && github.event.schedule == '0 13 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py previa_argentina

      - name: Analisis de grupo
        if: github.event_name == 'schedule' && github.event.schedule == '0 14 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py analisis_grupo

      - name: Numero del dia
        if: github.event_name == 'schedule' && github.event.schedule == '0 16 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py numero_dia

      - name: Debate
        if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py debate

      - name: Figura de la fecha
        if: github.event_name == 'schedule' && github.event.schedule == '0 10 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py figura_fecha

      - name: Noticia mediodia
        if: github.event_name == 'schedule' && github.event.schedule == '0 15 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py noticia

      - name: Noticia noche
        if: github.event_name == 'schedule' && github.event.schedule == '0 23 * * *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: python bot.py noticia

      - name: Manual
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:   ${{ secrets.X_ACCESS_SECRET }}
          PYTHONIOENCODING:  utf-8
          GITHUB_ACTIONS:    "true"
        run: |
          PREVIEW_FLAG=""
          if [ "${{ github.event.inputs.preview }}" = "true" ]; then
            PREVIEW_FLAG="--preview"
          fi
          python bot.py ${{ github.event.inputs.modo }} $PREVIEW_FLAG
